<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="25%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#141b2e"/>
      <stop offset="100%" stop-color="#0a0d18"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#4a6989"/>
      <stop offset="55%" stop-color="#2a2150"/>
      <stop offset="100%" stop-color="#10131e"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#cfd8e8">
    <circle cx="120" cy="90" r="2"/><circle cx="300" cy="160" r="1.5"/><circle cx="520" cy="70" r="2"/>
    <circle cx="980" cy="120" r="2.2"/><circle cx="1080" cy="300" r="1.6"/><circle cx="900" cy="500" r="2"/>
    <circle cx="200" cy="520" r="1.8"/><circle cx="60" cy="380" r="1.5"/><circle cx="1140" cy="80" r="1.5"/>
    <circle cx="760" cy="560" r="1.6"/><circle cx="420" cy="540" r="1.4"/>
  </g>

  <!-- planet with ring -->
  <g transform="translate(880 330)">
    <circle r="150" fill="url(#planet)" stroke="#7aa6d8" stroke-width="2" opacity="0.95"/>
    <ellipse rx="240" ry="62" fill="none" stroke="#d8966a" stroke-width="6" opacity="0.8" transform="rotate(-22)"/>
  </g>

  <!-- text -->
  <text x="90" y="270" font-family="Inter, Segoe UI, sans-serif" font-size="84" font-weight="700" fill="#ffffff">MobiGlas OS</text>
  <text x="92" y="340" font-family="JetBrains Mono, monospace" font-size="34" fill="#7aa6d8">Tools &amp; Links for Star Citizen</text>
  <text x="92" y="410" font-family="Inter, Segoe UI, sans-serif" font-size="28" fill="#95a3bb">A curated directory of the best community tools and resources.</text>
</svg>
